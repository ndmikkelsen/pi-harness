# Starter manifest only. Replace service/image details and add app-specific env before deploying.
service: "pi-harness"
image: "pi-harness/base"

servers:
  - "10.10.20.138"

registry:
  server: "harbor.compute.lan"
  username: admin
  password:
    - KAMAL_REGISTRY_PASSWORD

ssh:
  user: "compute"
  keys:
    - "~/.ssh/z3r0Layer-main"

builder:
  arch: amd64
