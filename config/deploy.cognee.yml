service: ai-harness-cognee
image: ai-harness/cognee

servers:
  - 10.10.20.138

proxy:
  host: ai-harness-cognee.apps.compute.lan
  app_port: 8000
  ssl: false
  forward_headers: true

registry:
  server: harbor.compute.lan
  username: admin
  password:
    - KAMAL_REGISTRY_PASSWORD

ssh:
  user: compute
  keys:
    - ~/.ssh/z3r0Layer-main

builder:
  arch: amd64
  dockerfile: .codex/docker/Dockerfile.cognee

env:
  clear:
    DB_PROVIDER: postgres
    DB_HOST: ai-harness-cognee-db
    DB_PORT: 5432
    DB_NAME: cognee
    DB_USERNAME: cognee
    VECTOR_DB_PROVIDER: pgvector
    VECTOR_DB_HOST: ai-harness-cognee-db
    VECTOR_DB_PORT: 5432
    VECTOR_DB_NAME: cognee
    VECTOR_DB_USERNAME: cognee
    GRAPH_DATABASE_PROVIDER: kuzu
    EMBEDDING_MODEL: text-embedding-3-small
    EMBEDDING_DIMENSIONS: "1536"
    REQUIRE_AUTHENTICATION: "false"
  secret:
    - DB_PASSWORD
    - VECTOR_DB_PASSWORD
    - RELATIONAL_DATABASE
    - VECTOR_DB_URL
    - LLM_API_KEY

accessories:
  db:
    image: pgvector/pgvector:pg17
    host: 10.10.20.138
    env:
      clear:
        POSTGRES_USER: cognee
        POSTGRES_DB: cognee
      secret:
        - POSTGRES_PASSWORD
    volumes:
      - /mnt/nfs/databases/ai-harness/cognee:/var/lib/postgresql/data
