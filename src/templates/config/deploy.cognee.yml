service: {{APP_SLUG}}-cognee
image: {{APP_SLUG}}/cognee

servers:
  - {{COMPUTE_HOST}}

proxy:
  host: {{APP_SLUG}}-cognee.apps.compute.lan
  app_port: 8000
  ssl: false
  forward_headers: true

registry:
  server: {{REGISTRY_HOST}}
  username: admin
  password:
    - KAMAL_REGISTRY_PASSWORD

ssh:
  user: {{COMPUTE_USER}}
  keys:
    - {{SSH_KEY_PATH}}

builder:
  arch: amd64
  dockerfile: .codex/docker/Dockerfile.cognee

env:
  clear:
    DB_PROVIDER: postgres
    DB_HOST: {{COGNEE_DB_HOST}}
    DB_PORT: 5432
    DB_NAME: cognee
    DB_USERNAME: cognee
    VECTOR_DB_PROVIDER: pgvector
    VECTOR_DB_HOST: {{COGNEE_DB_HOST}}
    VECTOR_DB_PORT: 5432
    VECTOR_DB_NAME: cognee
    VECTOR_DB_USERNAME: cognee
    GRAPH_DATABASE_PROVIDER: kuzu
    EMBEDDING_MODEL: text-embedding-3-small
    EMBEDDING_DIMENSIONS: "1536"
    REQUIRE_AUTHENTICATION: "false"
  secret:
    - DB_PASSWORD
    - VECTOR_DB_PASSWORD
    - RELATIONAL_DATABASE
    - VECTOR_DB_URL
    - LLM_API_KEY

accessories:
  db:
    image: pgvector/pgvector:pg17
    host: {{COMPUTE_HOST}}
    env:
      clear:
        POSTGRES_USER: cognee
        POSTGRES_DB: cognee
      secret:
        - POSTGRES_PASSWORD
    volumes:
      - /mnt/nfs/databases/{{APP_SLUG}}/cognee:/var/lib/postgresql/data
